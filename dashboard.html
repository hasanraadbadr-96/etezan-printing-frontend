<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f6fa;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #ffffff;
    position: fixed;
    right: 0;
    top: 0;
    border-left: 1px solid #eee;
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 12px 20px;
    text-decoration: none;
    color: #333;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #f0f0f0;
}

.sidebar a.active {
    background: #3e58a1;
    color: white;
}

/* Navbar */
.navbar {
    margin-right: 220px;
    height: 60px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid #eee;
}

/* Content */
.content {
    margin-right: 220px;
    padding: 20px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.card h3 {
    margin: 0;
    color: #888;
}

.card p {
    font-size: 22px;
    margin-top: 10px;
}

/* Table */
.table {
    margin-top: 30px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: right;
}

th {
    color: #666;
}
</style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>الاتزان</h2>
    <a class="active">الرئيسية</a>
    <a>الطلبات</a>
    <a>المنتجات</a>
    <a>المخزن</a>
    <a>الديون</a>
</div>

<!-- Navbar -->
<div class="navbar">
    <div>لوحة التحكم</div>
    <div>👤 حسن</div>
</div>

<!-- Content -->
<div class="content">

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>عدد الطلبات</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>الأرباح</h3>
            <p>$2,300</p>
        </div>

        <div class="card">
            <h3>المنتجات</h3>
            <p>58</p>
        </div>

        <div class="card">
            <h3>العملاء</h3>
            <p>34</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table">
        <h3>آخر الطلبات</h3>
        <table>
            <tr>
                <th>الاسم</th>
                <th>المنتج</th>
                <th>السعر</th>
            </tr>
            <tr>
                <td>علي</td>
                <td>طباعة كارت</td>
                <td>$20</td>
            </tr>
            <tr>
                <td>حسين</td>
                <td>بنر</td>
                <td>$50</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
