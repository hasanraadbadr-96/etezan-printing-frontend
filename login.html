<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Reem+Kufi+Fun&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="JavaScript/Login.js" defer></script>
  </head>

  <body class="body_login">
    <main>
      <div class="login-container">
        <form class="form-container">
          <h3 class="title">مطبعة الاتزان</h3>

          <h4 class="title-secondary">نورتونا</h4>

          <input type="text" placeholder="اسم المستخدم" class="input-field" />
          <input
            type="password"
            placeholder="كلمة المرور"
            class="input-field"
          />
          <button
            type="submit"
            id="myBtn"
            class="button-primary width-demo-button"
          >
            متابعة
          </button>
        </form>

        <div class="image-container">
          <div class="image" id="myLion"></div>
        </div>
      </div>
    </main>
  </body>
</html>
